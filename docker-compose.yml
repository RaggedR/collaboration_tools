services:
  postgres:
    image: postgres:16
    container_name: outlier-postgres
    environment:
      POSTGRES_USER: outlier
      POSTGRES_PASSWORD: outlier
      POSTGRES_DB: outlier
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U outlier']
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
