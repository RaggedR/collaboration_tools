name: collaboration_tools
description: Collaboration tools with kanban boards, sprints, documents, and knowledge graph.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  flutter_secure_storage: ^9.2.4
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.6
  flutter_math_fork: ^0.7.2
  markdown: ^7.2.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  appflowy_board: ^0.1.2
  drag_and_drop_lists: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
